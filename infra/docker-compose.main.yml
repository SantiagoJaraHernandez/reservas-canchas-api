services:
  postgres:
    image: postgres:15
    container_name: reservas-main-postgres
    restart: always
    environment:
      POSTGRES_DB: reservasdb_main
      POSTGRES_USER: reservas
      POSTGRES_PASSWORD: reservas123
    ports:
      - "5436:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    networks:
      - reservas-main-net

  mongodb:
    image: mongo:7
    container_name: reservas-main-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: authdb_main
    ports:
      - "27020:27017"
    volumes:
      - mongodb_main_data:/data/db
    networks:
      - reservas-main-net

  ms-auth:
    build: ../ms-auth
    container_name: reservas-main-ms-auth
    restart: always
    environment:
      SERVER_PORT: 8082
      MONGODB_URI: mongodb://mongodb:27017/authdb_main
      JWT_SECRET: main_secret_2026
    ports:
      - "8080:8082"
    depends_on:
      - mongodb
    networks:
      - reservas-main-net

  ms-reservas:
    build: ../ms-reservas
    container_name: reservas-main-ms-reservas
    restart: always
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reservasdb_main
      SPRING_DATASOURCE_USERNAME: reservas
      SPRING_DATASOURCE_PASSWORD: reservas123
      JPA_HIBERNATE_DDL_AUTO: update
      SHOW_SQL: false
    ports:
      - "8090:8081"
    depends_on:
      - postgres
    networks:
      - reservas-main-net

  gateway:
    build: ../gateway
    container_name: reservas-main-gateway
    restart: always
    environment:
      SERVER_PORT: 8080
      MS_RESERVAS_URL: http://ms-reservas:8081
      MS_AUTH_URL: http://ms-auth:8082
      JWT_SECRET: main_secret_2026
      CORS_ORIGINS: http://localhost:5173,http://localhost:5176
    ports:
      - "8000:8080"
    depends_on:
      - ms-auth
      - ms-reservas
    networks:
      - reservas-main-net

volumes:
  postgres_main_data:
  mongodb_main_data:

networks:
  reservas-main-net:
    driver: bridge