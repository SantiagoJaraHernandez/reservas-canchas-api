services:
  postgres:
    image: postgres:15
    container_name: reservas-qa-postgres
    restart: always
    environment:
      POSTGRES_DB: reservasdb_qa
      POSTGRES_USER: reservas
      POSTGRES_PASSWORD: reservas123
    ports:
      - "5435:5432"
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    networks:
      - reservas-qa-net

  mongodb:
    image: mongo:7
    container_name: reservas-qa-mongodb
    restart: always
    environment:
      MONGO_INITDB_DATABASE: authdb_qa
    ports:
      - "27019:27017"
    volumes:
      - mongodb_qa_data:/data/db
    networks:
      - reservas-qa-net

  ms-auth:
    build: ../ms-auth
    container_name: reservas-qa-ms-auth
    restart: always
    environment:
      SERVER_PORT: 8082
      MONGODB_URI: mongodb://mongodb:27017/authdb_qa
      JWT_SECRET: qa_jwt_secret_key_reservas_2026_12345
      
    ports:
      - "8081:8082"
    depends_on:
      - mongodb
    networks:
      - reservas-qa-net

  ms-reservas:
    build: ../ms-reservas
    container_name: reservas-qa-ms-reservas
    restart: always
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/reservasdb_qa
      SPRING_DATASOURCE_USERNAME: reservas
      SPRING_DATASOURCE_PASSWORD: reservas123
      JPA_HIBERNATE_DDL_AUTO: update
      SHOW_SQL: true
    ports:
      - "8091:8081"
    depends_on:
      - postgres
    networks:
      - reservas-qa-net

  gateway:
    build: ../gateway
    container_name: reservas-qa-gateway
    restart: always
    environment:
      SERVER_PORT: 8080
      MS_RESERVAS_URL: http://ms-reservas:8081
      MS_AUTH_URL: http://ms-auth:8082
      JWT_SECRET: qa_jwt_secret_key_reservas_2026_12345
      CORS_ORIGINS: http://localhost:5173,http://localhost:5176
    ports:
      - "8001:8080"
    depends_on:
      - ms-auth
      - ms-reservas
    networks:
      - reservas-qa-net

volumes:
  postgres_qa_data:
  mongodb_qa_data:

networks:
  reservas-qa-net:
    driver: bridge